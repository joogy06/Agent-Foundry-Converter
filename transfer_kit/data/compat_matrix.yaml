# transfer_kit/data/compat_matrix.yaml
#
# Per-artifact × per-target portability matrix used by
# transfer_kit.core.compat.CompatMatrix (design spec §11).
#
# Values:
#   portable     — emit as-is (plus path rewrites via path_rewriter)
#   degraded     — emit but warn that the host lacks some runtime behaviour
#   docs-only    — emit to a docs/ subdir, not a runtime path; no execution
#   claude-only  — do not emit for this target
#   excluded     — never emit anywhere, regardless of target
#   skip         — do not emit on this specific target (different intent
#                  than excluded — e.g. g2-only shim is skipped on claude
#                  because the full gates.py serves that role)

schema_version: "1.0.0"

artifacts:

  # Regular skills (everything under skills/ except agents and _meta).
  skill:
    claude: portable
    copilot: portable
    copilot-cli: portable
    gemini: portable
    windsurf: portable

  # Agents — host-level orchestrator prompts (bob, alf, pa, wiki).
  # Degraded on non-Claude hosts because Task/hooks/claims primitives
  # are Claude-specific (design spec §22 non-goal #1).
  agent:
    claude: portable
    copilot: degraded
    copilot-cli: degraded
    gemini: degraded
    windsurf: degraded

  # The upstream agent-foundry gates runtime.
  meta.gates.py:
    claude: portable
    copilot: docs-only
    copilot-cli: docs-only
    gemini: docs-only
    windsurf: docs-only

  # Companion shell wrapper for gates (non-runtime on any host — docs).
  meta.gates.sh:
    claude: portable
    copilot: docs-only
    copilot-cli: docs-only
    gemini: docs-only
    windsurf: docs-only

  # SYNTHESIS RULE — this file is GENERATED by transfer_kit from
  # transfer_kit/data/gates_g2_shim.py on emit. It is not present on
  # the source. Compat.py reads this entry to decide whether to
  # synthesise the shim for the given target.
  meta.gates.py.g2-only:
    claude: skip
    copilot: portable
    copilot-cli: portable
    gemini: portable
    windsurf: portable

  # Anti-drift checklist — markdown reference, still useful everywhere
  # but on non-Claude hosts it is not hook-enforced.
  meta.hard-rules-checklist.md:
    claude: portable
    copilot: degraded
    copilot-cli: degraded
    gemini: degraded
    windsurf: degraded

  # Claude-only runtime primitives.
  meta.claims.py: claude-only
  meta.audit_spawn.py: claude-only
  meta.forge_reminder_hook.py: claude-only
  meta.pause_state.py: claude-only
  meta.trusted_runner.py: claude-only
  meta.scan_hard_rules.py: claude-only

  # UX grouping JSON for Claude Code — no port value.
  meta.skill-families.json: excluded

excludes:
  # Glob patterns that never emit, regardless of target.
  - "skills/**/tests/**"
  - ".github/**"
  - ".git/**"
  - "**/__pycache__/**"
  - "**/.pytest_cache/**"

claude_ecosystem_only_markers:
  # Content markers that force claude-only classification when found inside
  # a file that would otherwise be portable (design spec §11). Matched as
  # plain substrings against file content (no regex).
  - "/codex:"
  - "ScheduleWakeup"
  - "CronCreate"
  - ".forge/session.key"
  - "claims.apply_request_idempotent"
